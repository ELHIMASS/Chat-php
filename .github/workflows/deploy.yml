name: CI/CD - Build & Deploy PHP Chat

on:
  push:
    branches:
      - main

jobs:
  # ── Étape 1 : Valide que le Dockerfile compile correctement ────
  build:
    name: Validate Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test local)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false   # pas de push Docker Hub requis
          tags: php-chat:latest

  # ── Étape 2 : Déclenche le déploiement Coolify ─────────────────
  deploy:
    name: Deploy via Coolify
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger Coolify deployment webhook
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            --fail \
            --silent \
            --show-error
